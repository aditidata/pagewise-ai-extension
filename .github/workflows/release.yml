name: 🚀 PageWise AI — Build & Release

# ── WHEN DOES THIS RUN? ───────────────────────────────────
# 1. On every push to main       → runs CI checks only
# 2. On every push of a v* tag   → runs CI checks + creates release
on:
  push:
    branches: [main]
    tags:
      - 'v*'          # v1.0, v1.1, v1.2 etc.
  pull_request:
    branches: [main]  # also runs on pull requests

jobs:

  # ══════════════════════════════════════════════════════════
  # JOB 1 — CI: Validate and Check
  # Runs on every push to main
  # ══════════════════════════════════════════════════════════
  ci:
    name: ✅ CI Checks
    runs-on: ubuntu-latest

    steps:

      # Step 1 — Download your code onto the GitHub server
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      # Step 2 — Validate manifest.json is valid JSON
      - name: 🔍 Validate manifest.json
        run: |
          node -e "
            const fs = require('fs');
            const manifest = JSON.parse(fs.readFileSync('manifest.json', 'utf8'));
            console.log('✅ manifest.json is valid JSON');
            console.log('   Name:', manifest.name);
            console.log('   Version:', manifest.version);
            console.log('   Manifest version:', manifest.manifest_version);
            if (manifest.manifest_version !== 3) {
              console.error('❌ Must use Manifest V3');
              process.exit(1);
            }
            console.log('✅ Manifest V3 confirmed');
          "

      # Step 3 — Check all required files exist
      - name: 📁 Check required files
        run: |
          echo "Checking required files..."
          
          files=(
            "manifest.json"
            "viewer.html"
            "viewer.js"
            "popup.html"
            "popup.js"
            "settings.html"
            "settings.js"
            "background.js"
            "content.js"
            "icons/icon16.png"
            "icons/icon48.png"
            "icons/icon128.png"
          )

          all_good=true

          for file in "${files[@]}"; do
            if [ -f "$file" ]; then
              echo "✅ $file exists"
            else
              echo "❌ MISSING: $file"
              all_good=false
            fi
          done

          if [ "$all_good" = false ]; then
            echo "❌ Some required files are missing!"
            exit 1
          fi

          echo "✅ All required files present"

      # Step 4 — Check JS files for syntax errors
      - name: 🔎 Check JavaScript syntax
        run: |
          echo "Checking JavaScript syntax..."
          
          for file in viewer.js popup.js settings.js background.js content.js; do
            if [ -f "$file" ]; then
              node --check "$file" && echo "✅ $file syntax OK" || echo "❌ $file has syntax errors"
            fi
          done

      # Step 5 — Check manifest has required permissions
      - name: 🔐 Check permissions
        run: |
          node -e "
            const manifest = JSON.parse(require('fs').readFileSync('manifest.json', 'utf8'));
            const required = ['activeTab', 'scripting', 'storage'];
            const permissions = manifest.permissions || [];
            
            required.forEach(p => {
              if (permissions.includes(p)) {
                console.log('✅ Permission present:', p);
              } else {
                console.error('❌ Missing permission:', p);
                process.exit(1);
              }
            });
          "

      # Step 6 — Print summary
      - name: 📊 CI Summary
        run: |
          echo "================================"
          echo "✅ All CI checks passed!"
          echo "================================"
          echo "Extension: PageWise AI"
          node -e "const m=JSON.parse(require('fs').readFileSync('manifest.json','utf8')); console.log('Version:', m.version)"
          echo "================================"

  # ══════════════════════════════════════════════════════════
  # JOB 2 — CD: Build ZIP and Create Release
  # Only runs when you push a version tag (v1.0, v1.1 etc.)
  # ══════════════════════════════════════════════════════════
  release:
    name: 📦 Build & Release
    runs-on: ubuntu-latest
    needs: ci                      # only runs if CI job passes
    if: startsWith(github.ref, 'refs/tags/v')  # only on version tags

    steps:

      # Step 1 — Download code
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      # Step 2 — Build the extension ZIP
      # Excludes: node_modules, .git, existing zips, .env files
      - name: 🗜️ Build extension ZIP
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "Building PageWise AI $VERSION..."

          zip -r "pagewise-ai-${VERSION}.zip" . \
            --exclude "*.git*" \
            --exclude "*/.git/*" \
            --exclude "backend/node_modules/*" \
            --exclude "*.zip" \
            --exclude ".env" \
            --exclude "*.log" \
            --exclude "node_modules/*"

          echo "✅ ZIP created: pagewise-ai-${VERSION}.zip"
          echo "📦 ZIP size: $(du -sh pagewise-ai-${VERSION}.zip | cut -f1)"

          # Save version for next steps
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "ZIP_NAME=pagewise-ai-${VERSION}.zip" >> $GITHUB_ENV

      # Step 3 — Create GitHub Release with ZIP attached
      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: "PageWise AI ${{ github.ref_name }}"
          files: ${{ env.ZIP_NAME }}
          body: |
            ## 📘 PageWise AI ${{ github.ref_name }}

            ### ✨ Install Instructions

            1. Download `${{ env.ZIP_NAME }}` below
            2. Extract / unzip the file
            3. Open Chrome → go to `chrome://extensions`
            4. Enable **Developer Mode** (top right toggle)
            5. Click **Load Unpacked** → select the extracted folder
            6. Click the PageWise AI icon → ⚙️ Settings
            7. Choose **Groq API** (free key at console.groq.com) or **Ollama** (local)

            ### 🔧 For Ollama (local mode)
            ```bash
            cd backend
            npm install
            node server.js
            ```

            ### 🔗 Links
            - [GitHub Repo](https://github.com/${{ github.repository }})
            - [Get Free Groq API Key](https://console.groq.com)
            - [Ollama Download](https://ollama.ai)

          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Step 4 — Print release summary
      - name: 🎉 Release Summary
        run: |
          echo "================================"
          echo "🎉 Release created successfully!"
          echo "================================"
          echo "Version : ${{ github.ref_name }}"
          echo "ZIP     : ${{ env.ZIP_NAME }}"
          echo "Repo    : https://github.com/${{ github.repository }}"
          echo "Release : https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}"
          echo "================================"
