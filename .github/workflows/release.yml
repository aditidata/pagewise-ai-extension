name: 🚀 PageWise AI — Build & Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:

  ci:
    name: ✅ CI Checks
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔍 Validate manifest.json
        run: |
          node -e "
            const fs = require('fs');
            const manifest = JSON.parse(fs.readFileSync('manifest.json', 'utf8'));
            console.log('✅ manifest.json valid - ' + manifest.name + ' v' + manifest.version);
            if (manifest.manifest_version !== 3) { console.error('❌ Need Manifest V3'); process.exit(1); }
          "

      - name: 📁 Check required files
        run: |
          for file in manifest.json viewer.html viewer.js popup.html popup.js settings.html settings.js background.js content.js; do
            if [ -f "$file" ]; then echo "✅ $file"; else echo "❌ MISSING: $file"; exit 1; fi
          done

      - name: 🔎 Check JS syntax
        run: |
          for file in viewer.js popup.js settings.js background.js content.js; do
            if [ -f "$file" ]; then node --check "$file" && echo "✅ $file syntax OK"; fi
          done

  release:
    name: 📦 Build & Release
    runs-on: ubuntu-latest
    needs: ci
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🗜️ Build ZIP
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          zip -r "pagewise-ai-${VERSION}.zip" . \
            --exclude "*.git*" \
            --exclude "backend/node_modules/*" \
            --exclude "*.zip" \
            --exclude ".env"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "ZIP_NAME=pagewise-ai-${VERSION}.zip" >> $GITHUB_ENV
          echo "✅ Built pagewise-ai-${VERSION}.zip"

      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: "PageWise AI ${{ github.ref_name }}"
          files: ${{ env.ZIP_NAME }}
          body: |
            ## 📘 PageWise AI ${{ github.ref_name }}

            ### ⚡ Install Instructions
            1. Download `${{ env.ZIP_NAME }}` below
            2. Extract the ZIP
            3. Open Chrome → `chrome://extensions`
            4. Enable **Developer Mode**
            5. Click **Load Unpacked** → select extracted folder
            6. Click extension icon → ⚙️ Settings → add Groq API key

            ### 🔗 Links
            - [Get Free Groq API Key](https://console.groq.com)
            - [Ollama Download](https://ollama.ai)
            - [GitHub Repo](https://github.com/${{ github.repository }})
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}