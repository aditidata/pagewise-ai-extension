name: 🚀 PageWise AI — Build & Release

on:
  push:
    branches: [main]
  create:
    tags:
      - 'v*'

jobs:

  ci:
    name: ✅ CI Checks
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔍 Validate manifest.json
        run: |
          node -e "
            const fs = require('fs');
            const manifest = JSON.parse(fs.readFileSync('manifest.json', 'utf8'));
            console.log('✅ manifest.json valid');
            console.log('   Name:', manifest.name);
            console.log('   Version:', manifest.version);
            if (manifest.manifest_version !== 3) { process.exit(1); }
            console.log('✅ Manifest V3 confirmed');
          "

      - name: 📁 Check required files
        run: |
          for file in manifest.json viewer.html viewer.js popup.html popup.js settings.html settings.js background.js content.js; do
            [ -f "$file" ] && echo "✅ $file" || (echo "❌ MISSING: $file" && exit 1)
          done

      - name: 🔎 Check JS syntax
        run: |
          for file in viewer.js popup.js settings.js background.js content.js; do
            [ -f "$file" ] && node --check "$file" && echo "✅ $file OK"
          done

      - name: ✅ CI Passed
        run: echo "All checks passed!"

  release:
    name: 📦 Build & Release
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'create' && startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🗜️ Build ZIP
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "Building $VERSION..."
          zip -r "pagewise-ai-${VERSION}.zip" . \
            --exclude "*.git*" \
            --exclude "backend/node_modules/*" \
            --exclude "*.zip" \
            --exclude ".env" \
            --exclude "*.log"
          echo "✅ Built: pagewise-ai-${VERSION}.zip"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "ZIP_NAME=pagewise-ai-${VERSION}.zip" >> $GITHUB_ENV

      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: "PageWise AI ${{ github.ref_name }}"
          files: ${{ env.ZIP_NAME }}
          body: |
            ## 📘 PageWise AI ${{ github.ref_name }}

            ### Install
            1. Download `${{ env.ZIP_NAME }}`
            2. Extract ZIP
            3. Chrome → `chrome://extensions` → Developer Mode → Load Unpacked
            4. Click extension → ⚙️ Settings → add Groq API key

            ### Links
            - [Get Free Groq API Key](https://console.groq.com)
            - [Ollama Download](https://ollama.ai)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🎉 Done
        run: echo "Released ${{ github.ref_name }} successfully!"