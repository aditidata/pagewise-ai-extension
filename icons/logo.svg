<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c6af7"/>
      <stop offset="100%" style="stop-color:#4fc3f7"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f7c948"/>
      <stop offset="100%" style="stop-color:#f97316"/>
    </linearGradient>
  </defs>

  <!-- Background rounded rect -->
  <rect width="128" height="128" rx="22" fill="url(#bg)"/>

  <!-- Page shape -->
  <rect x="24" y="18" width="58" height="76" rx="6" fill="#1e1e32" stroke="#2a2a4a" stroke-width="1.5"/>
  <!-- Page fold corner -->
  <path d="M70 18 L82 30 L70 30 Z" fill="#2a2a4a"/>
  <path d="M70 18 L82 30 L70 30" fill="none" stroke="#3a3a5a" stroke-width="1"/>

  <!-- Page lines -->
  <rect x="32" y="38" width="34" height="3" rx="1.5" fill="#3a3a5a"/>
  <rect x="32" y="46" width="28" height="3" rx="1.5" fill="#3a3a5a"/>
  <rect x="32" y="54" width="36" height="3" rx="1.5" fill="#3a3a5a"/>
  <rect x="32" y="62" width="22" height="3" rx="1.5" fill="#3a3a5a"/>

  <!-- Highlighted line (accent) -->
  <rect x="32" y="70" width="30" height="3" rx="1.5" fill="url(#accent)" opacity="0.8"/>

  <!-- AI Brain circle -->
  <circle cx="90" cy="88" r="28" fill="#12121e" stroke="#2a2a4a" stroke-width="1.5"/>
  <circle cx="90" cy="88" r="22" fill="none" stroke="url(#accent)" stroke-width="2" stroke-dasharray="4 2"/>

  <!-- Brain neural nodes -->
  <circle cx="90" cy="78" r="4" fill="url(#accent)"/>
  <circle cx="80" cy="88" r="3.5" fill="url(#accent)" opacity="0.8"/>
  <circle cx="100" cy="88" r="3.5" fill="url(#accent)" opacity="0.8"/>
  <circle cx="84" cy="97" r="3" fill="url(#gold)" opacity="0.9"/>
  <circle cx="96" cy="97" r="3" fill="url(#gold)" opacity="0.9"/>

  <!-- Neural connections -->
  <line x1="90" y1="78" x2="80" y2="88" stroke="url(#accent)" stroke-width="1.5" opacity="0.6"/>
  <line x1="90" y1="78" x2="100" y2="88" stroke="url(#accent)" stroke-width="1.5" opacity="0.6"/>
  <line x1="80" y1="88" x2="84" y2="97" stroke="url(#gold)" stroke-width="1.5" opacity="0.6"/>
  <line x1="100" y1="88" x2="96" y2="97" stroke="url(#gold)" stroke-width="1.5" opacity="0.6"/>
  <line x1="80" y1="88" x2="100" y2="88" stroke="url(#accent)" stroke-width="1" opacity="0.4"/>
  <line x1="84" y1="97" x2="96" y2="97" stroke="url(#gold)" stroke-width="1" opacity="0.4"/>
</svg>
