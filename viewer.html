<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <title>PageWise AI Viewer</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:          #08080f;
      --surface:     #10101c;
      --surface2:    #18182a;
      --border:      #252540;
      --border2:     #2e2e52;
      --accent:      #7c6af7;
      --accent-soft: rgba(124,106,247,0.12);
      --accent2:     #4fc3f7;
      --accent3:     #f7c948;
      --accent4:     #4ade80;
      --text:        #e4e4f0;
      --text-muted:  #6060a0;
      --text-dim:    #404070;
      --danger:      #f87171;
      --shadow:      0 8px 40px rgba(0,0,0,0.7);
      --tr:          0.2s cubic-bezier(0.4,0,0.2,1);
    }
    [data-theme="light"] {
      --bg:#f0f0f8; --surface:#fff; --surface2:#f4f4fc;
      --border:#dcdcf0; --border2:#c8c8e8;
      --text:#1a1a3a; --text-muted:#6060a0; --text-dim:#a0a0c0;
      --accent-soft:rgba(124,106,247,0.08);
      --shadow:0 4px 20px rgba(0,0,0,0.12);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;transition:background var(--tr),color var(--tr)}

    /* TOPBAR */
    .topbar{display:flex;align-items:center;gap:10px;padding:0 14px;height:50px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
    .logo{display:flex;align-items:center;gap:7px}
    .logo-icon{width:28px;height:28px;background:linear-gradient(135deg,#7c6af7,#4fc3f7);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
    .logo-text{font-size:14px;font-weight:700;color:var(--text);letter-spacing:-0.5px;white-space:nowrap}
    .logo-text span{color:var(--accent)}
    .divider{width:1px;height:22px;background:var(--border);flex-shrink:0}
    .tabs-wrap{display:flex;align-items:center;gap:3px;flex:1;overflow-x:auto;scrollbar-width:none}
    .tabs-wrap::-webkit-scrollbar{display:none}
    .tab{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:7px;background:transparent;border:1px solid transparent;color:var(--text-muted);font-size:11.5px;font-family:'Sora',sans-serif;cursor:pointer;white-space:nowrap;transition:all var(--tr);max-width:160px}
    .tab.active{background:var(--accent-soft);border-color:var(--border2);color:var(--text)}
    .tab:hover:not(.active){background:var(--surface2);color:var(--text)}
    .tab-name{overflow:hidden;text-overflow:ellipsis;max-width:110px}
    .tab-x{font-size:10px;color:var(--text-dim);padding:0 2px;border-radius:3px;transition:all 0.15s}
    .tab-x:hover{color:var(--danger)}
    .add-tab{padding:4px 9px;border-radius:7px;background:transparent;border:1px dashed var(--border2);color:var(--text-muted);font-size:15px;cursor:pointer;transition:all var(--tr);flex-shrink:0}
    .add-tab:hover{color:var(--accent);border-color:var(--accent)}
    .topbar-right{display:flex;align-items:center;gap:5px;flex-shrink:0}
    .icon-btn{width:30px;height:30px;border-radius:7px;background:transparent;border:1px solid var(--border);color:var(--text-muted);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all var(--tr)}
    .icon-btn:hover{background:var(--surface2);color:var(--text)}
    .action-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:5px 11px;border-radius:7px;cursor:pointer;font-size:11px;font-family:'Sora',sans-serif;font-weight:500;transition:all var(--tr);white-space:nowrap}
    .action-btn:hover{background:var(--accent);border-color:var(--accent);color:#fff}

    /* TOOLBAR */
    .toolbar{display:flex;align-items:center;gap:8px;padding:7px 14px;background:var(--surface2);border-bottom:1px solid var(--border);flex-shrink:0}
    #status{flex:1;font-size:11px;color:var(--text-muted);font-family:'JetBrains Mono',monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .nav-group{display:flex;align-items:center;gap:5px;background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:3px 7px}
    .nav-btn{background:transparent;border:1px solid transparent;color:var(--text-muted);padding:3px 9px;border-radius:5px;cursor:pointer;font-size:12px;font-family:'Sora',sans-serif;transition:all var(--tr)}
    .nav-btn:hover:not(:disabled){background:var(--accent);color:#fff}
    .nav-btn:disabled{opacity:.25;cursor:not-allowed}
    #page-info{font-size:11.5px;color:var(--text-muted);min-width:72px;text-align:center;font-family:'JetBrains Mono',monospace}
    .slider-wrap{display:flex;align-items:center;gap:5px}
    .slider-label{font-size:10.5px;color:var(--text-dim)}
    #page-slider{-webkit-appearance:none;width:90px;height:3px;background:var(--border);border-radius:3px;outline:none;cursor:pointer}
    #page-slider::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--accent);cursor:pointer;transition:transform .15s}
    #page-slider::-webkit-slider-thumb:hover{transform:scale(1.3)}

    /* MAIN */
    .main{display:flex;flex:1;overflow:hidden}

    /* PDF PANE */
    .pdf-pane{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;align-items:center;background:var(--bg);scrollbar-width:thin;scrollbar-color:var(--border) transparent}
    .pdf-pane::-webkit-scrollbar{width:4px}
    .pdf-pane::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
    .canvas-wrap{position:relative;box-shadow:var(--shadow);border-radius:5px;overflow:hidden;border:1px solid var(--border)}
    #pdf-canvas{display:block;max-width:100%}
    .page-flash{position:absolute;inset:0;background:var(--accent);opacity:0;pointer-events:none;transition:opacity .1s}
    .page-flash.flash{opacity:.07}

    /* RIGHT PANEL */
    .right-panel{width:350px;flex-shrink:0;display:flex;flex-direction:column;background:var(--surface);border-left:1px solid var(--border);overflow:hidden}
    .panel-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
    .panel-tab{flex:1;padding:9px 8px;text-align:center;font-size:11.5px;font-weight:500;color:var(--text-muted);cursor:pointer;border-bottom:2px solid transparent;transition:all var(--tr);background:transparent;border-top:none;border-left:none;border-right:none;font-family:'Sora',sans-serif}
    .panel-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
    .panel-tab:hover:not(.active){color:var(--text);background:var(--surface2)}
    .panel-section{display:none;flex-direction:column;flex:1;overflow:hidden}
    .panel-section.active{display:flex}

    /* SUMMARY */
    .sum-header{padding:9px 13px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
    .cache-tag{font-size:10px;color:var(--accent4);background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.25);padding:2px 7px;border-radius:20px;font-family:'JetBrains Mono',monospace}
    .loader-wrap{display:none;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:40px 20px;flex:1}
    .loader-wrap.active{display:flex}
    .loader-ring{width:34px;height:34px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .75s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loader-dots{display:flex;gap:5px}
    .loader-dots span{width:5px;height:5px;background:var(--accent);border-radius:50%;animation:bounce 1s infinite}
    .loader-dots span:nth-child(2){animation-delay:.15s}
    .loader-dots span:nth-child(3){animation-delay:.3s}
    @keyframes bounce{0%,80%,100%{transform:scale(.5);opacity:.3}40%{transform:scale(1);opacity:1}}
    .loader-text{font-size:11px;color:var(--text-muted);font-family:'JetBrains Mono',monospace;animation:pulse 1.5s infinite}
    @keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
    .summary-scroll{flex:1;overflow-y:auto;padding:12px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
    .summary-scroll::-webkit-scrollbar{width:3px}
    .summary-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
    .summary-text{font-size:12.5px;line-height:1.75;white-space:pre-wrap}
    .hl-line{display:block;background:var(--accent-soft);border-left:3px solid var(--accent);border-radius:0 5px 5px 0;padding:5px 9px;margin:3px 0;animation:sli .3s ease forwards}
    .pl-line{display:block;padding:2px 0;color:var(--text-muted);animation:sli .3s ease forwards}
    @keyframes sli{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:translateX(0)}}
    .keywords-wrap{display:flex;flex-wrap:wrap;gap:5px;padding:9px 13px;border-top:1px solid var(--border);flex-shrink:0}
    .kw-tag{font-size:10px;background:var(--surface2);border:1px solid var(--border);color:var(--accent3);padding:2px 8px;border-radius:20px;font-family:'JetBrains Mono',monospace;cursor:default;transition:all var(--tr)}
    .kw-tag:hover{background:var(--accent3);color:var(--bg);border-color:var(--accent3)}
    .panel-footer{padding:8px 12px;border-top:1px solid var(--border);display:flex;gap:5px;flex-shrink:0}

    /* CHAT */
    .chat-messages{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
    .chat-messages::-webkit-scrollbar{width:3px}
    .chat-messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
    .chat-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--text-dim);font-size:12px;text-align:center;padding:20px}
    .chat-empty .ei{font-size:30px}
    .bubble{max-width:92%;padding:7px 11px;border-radius:11px;font-size:12px;line-height:1.6;animation:sli .25s ease}
    .bubble.user{background:var(--accent);color:#fff;align-self:flex-end;border-bottom-right-radius:3px}
    .bubble.ai{background:var(--surface2);color:var(--text);align-self:flex-start;border:1px solid var(--border);border-bottom-left-radius:3px}
    .bubble.thinking{background:var(--surface2);color:var(--text-muted);align-self:flex-start;border:1px solid var(--border);font-family:'JetBrains Mono',monospace;font-size:10.5px}
    .chat-input-wrap{padding:9px 12px;border-top:1px solid var(--border);display:flex;gap:5px;flex-shrink:0}
    #chat-input{flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:7px 11px;border-radius:9px;font-size:12px;font-family:'Sora',sans-serif;outline:none;resize:none;height:36px;transition:border-color var(--tr)}
    #chat-input:focus{border-color:var(--accent)}
    #chat-input::placeholder{color:var(--text-dim)}
    #chat-send{width:36px;height:36px;background:var(--accent);border:none;border-radius:9px;color:#fff;font-size:15px;cursor:pointer;transition:all var(--tr);flex-shrink:0}
    #chat-send:hover{background:#6a58e5;transform:scale(1.05)}
    #chat-send:disabled{opacity:.4;cursor:not-allowed;transform:none}

    /* MODALS */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;z-index:200}
    .modal-overlay.open{display:flex}
    .modal-box{background:var(--surface);border:1px solid var(--border);border-radius:14px;width:660px;max-height:80vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,.6);animation:mIn .2s ease}
    @keyframes mIn{from{opacity:0;transform:scale(.96) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
    .modal-header{padding:13px 17px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
    .modal-header h3{font-size:13.5px;font-weight:600;color:var(--accent2)}
    .modal-body{overflow-y:auto;padding:14px 17px;flex:1;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
    .modal-body::-webkit-scrollbar{width:3px}
    .modal-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
    .page-block{margin-bottom:14px;border:1px solid var(--border);border-radius:9px;overflow:hidden;animation:sli .3s ease}
    .page-block-h{background:var(--surface2);padding:6px 12px;font-size:10.5px;font-weight:600;color:var(--accent);font-family:'JetBrains Mono',monospace}
    .page-block-b{padding:10px 12px;font-size:12px;line-height:1.7;color:var(--text);white-space:pre-wrap}
    .modal-footer{padding:10px 17px;border-top:1px solid var(--border);display:flex;gap:6px;justify-content:flex-end}
    .add-pdf-input{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:9px 13px;border-radius:9px;font-size:12.5px;font-family:'Sora',sans-serif;outline:none;margin-top:10px}
    .add-pdf-input:focus{border-color:var(--accent)}
    .modal-sm{max-width:440px}
  </style>
</head>
<body>

<div class="topbar">
  <div class="logo">
    <div class="logo-icon">📘</div>
    <div class="logo-text">Page<span>Wise</span></div>
  </div>
  <div class="divider"></div>
  <div class="tabs-wrap" id="tabs-wrap"></div>
  <button class="add-tab" id="add-tab-btn" title="Open another PDF">+</button>
  <div class="divider"></div>
  <div class="topbar-right">
    <button class="icon-btn" id="theme-btn" title="Toggle theme">🌙</button>
    <button class="action-btn" id="summarize-all-btn">⚡ All Pages</button>
    <button class="action-btn" id="export-btn">⬇ Export</button>
  </div>
</div>

<div class="toolbar">
  <div id="status">Loading PDF...</div>
  <div class="slider-wrap">
    <span class="slider-label">pg</span>
    <input type="range" id="page-slider" min="1" value="1" step="1"/>
  </div>
  <div class="nav-group">
    <button class="nav-btn" id="prev-page">◀</button>
    <span id="page-info">— / —</span>
    <button class="nav-btn" id="next-page">▶</button>
  </div>
</div>

<div class="main">
  <div class="pdf-pane">
    <div class="canvas-wrap">
      <canvas id="pdf-canvas"></canvas>
      <div class="page-flash" id="page-flash"></div>
    </div>
  </div>

  <div class="right-panel">
    <div class="panel-tabs">
      <button class="panel-tab active" data-panel="summary">🧠 Summary</button>
      <button class="panel-tab" data-panel="chat">💬 Chat</button>
    </div>

    <!-- SUMMARY -->
    <div class="panel-section active" id="panel-summary">
      <div class="sum-header">
        <span style="font-size:12px;font-weight:600;color:var(--accent2)">AI Summary</span>
        <span class="cache-tag" id="cache-tag" style="display:none">✓ cached</span>
      </div>
      <div class="loader-wrap" id="loader">
        <div class="loader-ring"></div>
        <div class="loader-dots"><span></span><span></span><span></span></div>
        <div class="loader-text">Thinking with llama3.2...</div>
      </div>
      <div class="summary-scroll" id="summary-scroll" style="display:none">
        <div class="summary-text" id="summary-box"></div>
      </div>
      <div class="keywords-wrap" id="keywords-wrap"></div>
      <div class="panel-footer">
        <button class="action-btn" id="copy-btn" style="flex:1">📋 Copy Summary</button>
      </div>
    </div>

    <!-- CHAT -->
    <div class="panel-section" id="panel-chat">
      <div class="chat-messages" id="chat-messages">
        <div class="chat-empty">
          <div class="ei">💬</div>
          <div>Ask anything about this page.<br>AI answers from the page content.</div>
        </div>
      </div>
      <div class="chat-input-wrap">
        <textarea id="chat-input" placeholder="Ask about this page..." rows="1"></textarea>
        <button id="chat-send">➤</button>
      </div>
    </div>
  </div>
</div>

<!-- ALL PAGES MODAL -->
<div class="modal-overlay" id="all-pages-modal">
  <div class="modal-box">
    <div class="modal-header">
      <h3>📄 Full Document Summary</h3>
      <button class="action-btn" id="close-all-modal">✕</button>
    </div>
    <div class="modal-body" id="all-pages-body">
      <div style="color:var(--text-muted);font-size:13px;text-align:center;padding:30px">Processing...</div>
    </div>
    <div class="modal-footer">
      <button class="action-btn" id="export-all-btn">⬇ Export All</button>
      <button class="action-btn" id="close-all-modal2">Close</button>
    </div>
  </div>
</div>

<!-- ADD PDF MODAL -->
<div class="modal-overlay" id="add-pdf-modal">
  <div class="modal-box modal-sm">
    <div class="modal-header">
      <h3>📂 Open Another PDF</h3>
      <button class="action-btn" id="close-add-modal">✕</button>
    </div>
    <div class="modal-body">
      <div style="font-size:12.5px;color:var(--text-muted)">Paste a local file URL:</div>
      <input type="text" class="add-pdf-input" id="new-pdf-url" placeholder="file:///C:/path/to/file.pdf"/>
    </div>
    <div class="modal-footer">
      <button class="action-btn" id="open-new-pdf">Open PDF</button>
    </div>
  </div>
</div>

<script src="pdfjs/pdf.min.js"></script>
<script src="viewer.js"></script>
</body>
</html>
